# This is a Databricks asset bundle definition for metadata_governance.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: metadata_governance
  uuid: 2f575d08-b90b-42b4-9e4d-fd12bef695f3

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
    default: default

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-40e0cb7a-cf20.cloud.databricks.com
    variables:
      catalog: test_metadata_governance
  prod:
    mode: production
    workspace:
      host: https://dbc-40e0cb7a-cf20.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/shkodraelmedina@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/shkodraelmedina@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: metadata_governance
    permissions:
      - user_name: shkodraelmedina@gmail.com
        level: CAN_MANAGE
