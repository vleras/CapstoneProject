resources:
  jobs:
    test_metadata_governance_pipeline:
      name: "[TEST] metadata_governance_pipeline"

      tags:
        project: metadata-governance
        layer: orchestration
        team: data-engineering
        env: test

      max_concurrent_runs: 1
      timeout_seconds: 7200

      email_notifications:
        on_failure:
          - leutrimrexhaj31@gmail.com

      notification_settings:
        no_alert_for_skipped_runs: true
        no_alert_for_canceled_runs: true

      health:
        rules:
          - metric: RUN_DURATION_SECONDS
            op: GREATER_THAN
            value: 3600

      # No trigger block — manual runs only

      queue:
        enabled: true

      environments:
        - environment_key: default
          spec:
            environment_version: "4"

      tasks:
        - task_key: bronze_ingestion
          environment_key: default
          timeout_seconds: 1800
          max_retries: 2
          min_retry_interval_millis: 300000
          retry_on_timeout: true
          notebook_task:
            notebook_path: /Repos/shkodraelmedina@gmail.com/Test-CP/notebooks/01_bronze_ingestion
            source: WORKSPACE

        - task_key: silver_transformation
          depends_on:
            - task_key: bronze_ingestion
          environment_key: default
          timeout_seconds: 1800
          max_retries: 2
          min_retry_interval_millis: 300000
          retry_on_timeout: true
          notebook_task:
            notebook_path: /Repos/shkodraelmedina@gmail.com/Test-CP/notebooks/02_Silver_Metadata_Transformation
            source: WORKSPACE

        - task_key: gold_compliance_engine
          depends_on:
            - task_key: silver_transformation
          environment_key: default
          timeout_seconds: 1800
          max_retries: 2
          min_retry_interval_millis: 300000
          retry_on_timeout: true
          notebook_task:
            notebook_path: /Repos/shkodraelmedina@gmail.com/Test-CP/notebooks/03_Gold_Compliance_Engine
            source: WORKSPACE

        - task_key: pipeline_logging
          depends_on:
            - task_key: gold_compliance_engine
          environment_key: default
          timeout_seconds: 600
          max_retries: 1
          min_retry_interval_millis: 60000
          retry_on_timeout: false
          notebook_task:
            notebook_path: /Repos/shkodraelmedina@gmail.com/Test-CP/notebooks/04_pipeline_logging
            source: WORKSPACE
